<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invitación ❤️</title>

<style>

body{
margin:0;
height:100vh;
font-family:Arial;
background:black;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}


/* contador */

#contador{
color:white;
font-size:100px;
}


/* invitación */

#pagina{
display:none;
height:100vh;
width:100%;
background-image:url("Texto.png");
background-size:cover;
background-position:center;
position:relative;
}


/* texto animado */

#texto{
position:absolute;
top:20%;
left:10%;
right:10%;
text-align:center;
font-size:30px;
color:white;
font-weight:bold;
text-shadow:2px 2px 5px black;
}


/* botón */

button{

position:absolute;
bottom:50px;
left:50%;
transform:translateX(-50%);

padding:15px 30px;
border:none;
border-radius:30px;

background:#e91e63;
color:white;

font-size:20px;

}


/* juguetes */

.juguete{
position:absolute;
font-size:60px;
animation:flotar 2s infinite alternate;
}

.uno{
left:20px;
bottom:20px;
}

.dos{
right:30px;
top:30px;
}

.tres{
right:50px;
bottom:20px;
}


@keyframes flotar{

from{
transform:translateY(0);
}

to{
transform:translateY(-20px);
}

}


</style>

</head>


<body>


<audio id="musica" loop>
<source src="musica.mp3">
</audio>



<div id="contador">
3
</div>



<div id="pagina">


<div class="juguete uno">🤠</div>
<div class="juguete dos">👽</div>
<div class="juguete tres">🧸</div>



<div id="texto"></div>



<button onclick="whatsapp()">
Aceptar ❤️
</button>


</div>



<script>


let n=3;


let cuenta=setInterval(()=>{


n--;

document.getElementById("contador").innerHTML=n;


if(n==0){


clearInterval(cuenta);


document.getElementById("contador").style.display="none";


document.getElementById("pagina").style.display="block";


document.getElementById("musica").play();


escribir();


}


},1000);





let mensaje =
"Para: Mi cielo ❤️\n\n"+
"Te tengo una sorpresa 🍿🎬\n\n"+
"🎥 Toy Story 5\n"+
"📅 1 de julio\n"+
"🕗 8:00 p. m.\n"+
"📍 CineColombia – Nuestro Bogotá\n\n"+
"Con amor,\nTu novia ❤️";



let i=0;


function escribir(){


if(i<mensaje.length){


document.getElementById("texto").innerHTML += mensaje.charAt(i).replace("\n","<br>");


i++;

setTimeout(escribir,80);


}

}




function whatsapp(){


window.open(
"https://wa.me/573132045484?text=Sí Juliana, acepto la invitación ❤️🍿"
);


}


</script>


</body>
</html>
